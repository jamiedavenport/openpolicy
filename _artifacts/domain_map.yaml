library:
  name: openpolicy
  version: '0.0.19'
  repository: 'https://github.com/jamiedavenport/openpolicy'
  description: >
    Policy-as-code library that compiles privacy policies, terms of service,
    and cookie policies from TypeScript configs — rendered at runtime via React
    components with auto-collected data annotations at build time.
  primary_framework: React

domains:
  - name: Initial Setup
    slug: setup
    description: >
      Installing packages, wiring the Vite plugin, and wrapping the app with
      the OpenPolicy provider — the prerequisite before any other task.

  - name: Authoring Policies
    slug: policy-definition
    description: >
      Writing and maintaining the defineConfig() object that describes what
      data is collected, under what legal basis, and what terms apply.

  - name: Annotating Collection
    slug: annotation
    description: >
      Marking data collection points and third-party dependencies in source
      code so the autoCollect plugin can populate them automatically.

  - name: Rendering in React
    slug: rendering
    description: >
      Using React components to display policy documents and manage cookie
      consent state — the output layer that users see.

skills:
  - name: Getting Started
    slug: getting-started
    domain: setup
    description: >
      End-to-end setup from install through first rendered policy: SDK +
      React + vite-auto-collect, create openpolicy.ts, wrap app, render.
    type: lifecycle
    packages:
      - '@openpolicy/sdk'
      - '@openpolicy/react'
      - '@openpolicy/vite-auto-collect'
    covers:
      - 'bun add / npm install'
      - 'defineConfig() in openpolicy.ts'
      - 'autoCollect() in vite.config.ts'
      - '<OpenPolicy> provider wrapping'
      - '<PrivacyPolicy> first render'
      - 'dataCollected and thirdParties spread into config'
    tasks:
      - 'Set up OpenPolicy in a new project from scratch'
      - 'Wire the Vite plugin and SDK together'
      - 'Render the first privacy policy page'
    failure_modes:
      - mistake: 'Using openPolicy() vite plugin instead of autoCollect()'
        mechanism: >
          The openPolicy() plugin generates static files at build time; the
          current recommended pattern is React runtime rendering + autoCollect()
          plugin. Using openPolicy() produces stale static files rather than
          live components driven by your config.
        wrong_pattern: |
          // vite.config.ts — WRONG: old pattern
          import { openPolicy } from '@openpolicy/vite';
          export default defineConfig({
            plugins: [openPolicy({ formats: ['markdown'], outDir: 'public/policies' })],
          });
        correct_pattern: |
          // vite.config.ts — correct
          import { autoCollect } from '@openpolicy/vite-auto-collect';
          export default defineConfig({
            plugins: [autoCollect()],
          });
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['getting-started', 'vite-setup', 'render-policies', 'cookie-banner']

      - mistake: 'Forgetting to wrap app with <OpenPolicy> provider'
        mechanism: >
          React components (PrivacyPolicy, TermsOfService, CookiePolicy,
          useCookies) read from context; without the provider they render null
          or throw, with no visible error in most cases.
        wrong_pattern: |
          // App.tsx — WRONG: missing provider
          export function App() {
            return <PrivacyPolicy />;
          }
        correct_pattern: |
          // App.tsx — correct
          import config from './openpolicy';
          export function App() {
            return (
              <OpenPolicy config={config}>
                <PrivacyPolicy />
              </OpenPolicy>
            );
          }
        source: 'packages/react/src/context.tsx'
        priority: HIGH
        status: active

      - mistake: 'Not spreading dataCollected and thirdParties into config'
        mechanism: >
          Without spreading the SDK sentinels, the autoCollect plugin output is
          discarded. The policy compiles with empty data collected and no third
          parties, which may be legally invalid.
        wrong_pattern: |
          // openpolicy.ts — WRONG: sentinels not spread
          export default defineConfig({
            company: { ... },
            privacy: {
              dataCollected: { 'Account Info': ['Email'] }, // manually specified only
              thirdParties: [],
            },
          });
        correct_pattern: |
          // openpolicy.ts — correct
          import { defineConfig, dataCollected, thirdParties } from '@openpolicy/sdk';
          export default defineConfig({
            company: { ... },
            privacy: {
              dataCollected: { ...dataCollected, 'Account Info': ['Email'] },
              thirdParties: [...thirdParties],
            },
          });
        source: 'packages/sdk/src/auto-collected.ts'
        priority: HIGH
        status: active

  - name: Define Config
    slug: define-config
    domain: policy-definition
    description: >
      Writing the defineConfig() object for privacy policy, terms of service,
      and cookie policy — all fields, types, jurisdiction-specific requirements.
    type: core
    packages:
      - '@openpolicy/sdk'
      - '@openpolicy/core'
    covers:
      - 'defineConfig()'
      - 'OpenPolicyConfig shape (nested company)'
      - 'PrivacyPolicyConfig fields'
      - 'TermsOfServiceConfig fields'
      - 'CookiePolicyConfig fields'
      - 'Jurisdiction-specific requirements (GDPR, CCPA)'
      - 'Compliance presets (Compliance.GDPR, Compliance.CCPA)'
      - 'DataCategories, Retention, Rights, LegalBases, Providers constants'
    tasks:
      - 'Write a complete privacy policy config'
      - 'Add terms of service to an existing config'
      - 'Configure GDPR compliance requirements'
      - 'Use preset constants instead of raw strings'
    failure_modes:
      - mistake: 'Using standalone PrivacyPolicyConfig instead of nested OpenPolicyConfig'
        mechanism: >
          React components and the autoCollect pipeline expect the nested
          OpenPolicyConfig shape (company at top level, policies under
          privacy/terms/cookie keys). The standalone shapes require separate
          compile calls and lose the unified config benefit.
        wrong_pattern: |
          // WRONG: standalone shape, company repeated
          import type { PrivacyPolicyConfig } from '@openpolicy/sdk';
          const config: PrivacyPolicyConfig = {
            company: { name: 'Acme', ... },
            effectiveDate: '2026-01-01',
            ...
          };
        correct_pattern: |
          // correct: nested OpenPolicyConfig
          import { defineConfig } from '@openpolicy/sdk';
          export default defineConfig({
            company: { name: 'Acme', legalName: 'Acme, Inc.', address: '...', contact: 'privacy@acme.com' },
            privacy: {
              effectiveDate: '2026-01-01',
              ...
            },
          });
        source: 'packages/core/src/types.ts'
        priority: HIGH
        status: active

      - mistake: 'Omitting governingLaw from terms of service'
        mechanism: >
          governingLaw is required in TermsOfServiceConfig. Validation throws
          a fatal error if absent, but TypeScript may not catch it if the field
          is accidentally omitted from a partial type.
        wrong_pattern: |
          terms: {
            effectiveDate: '2026-01-01',
            acceptance: { methods: ['using the service'] },
            // governingLaw missing
          }
        correct_pattern: |
          terms: {
            effectiveDate: '2026-01-01',
            acceptance: { methods: ['using the service'] },
            governingLaw: { jurisdiction: 'Delaware, USA' },
          }
        source: 'packages/core/src/validate-terms.ts'
        priority: HIGH
        status: active

      - mistake: 'Not specifying jurisdictions for GDPR/CCPA compliance fields'
        mechanism: >
          Jurisdiction-specific sections (legalBasis for EU, opt_out_sale
          right for CA) are only generated when the corresponding jurisdiction
          is in the jurisdictions array. An agent may omit jurisdictions
          causing required GDPR/CCPA sections to silently disappear.
        wrong_pattern: |
          privacy: {
            legalBasis: 'legitimate_interests',
            userRights: ['access', 'erasure'],
            // jurisdictions missing — legalBasis section won't appear
          }
        correct_pattern: |
          privacy: {
            legalBasis: 'legitimate_interests',
            userRights: ['access', 'erasure'],
            jurisdictions: ['eu', 'us'],
          }
        source: 'packages/core/src/templates/privacy/'
        priority: MEDIUM
        status: active

  - name: Vite Setup
    slug: vite-setup
    domain: setup
    description: >
      Configuring the autoCollect() Vite plugin — options, plugin ordering,
      srcDir, extensions, usePackageJson for third-party auto-detection.
    type: framework
    packages:
      - '@openpolicy/vite-auto-collect'
    covers:
      - 'autoCollect() plugin'
      - 'AutoCollectOptions (srcDir, extensions, ignore, thirdParties.usePackageJson)'
      - 'enforce: "pre" plugin ordering'
      - 'virtual module resolution for @openpolicy/sdk auto-collected'
      - 'dev server hot reload on source changes'
    tasks:
      - 'Add autoCollect() to vite.config.ts'
      - 'Configure src directory and file extensions to scan'
      - 'Enable usePackageJson for automatic third-party detection'
    failure_modes:
      - mistake: 'Using openPolicy() instead of autoCollect() in vite.config.ts'
        mechanism: >
          openPolicy() generates static policy files; autoCollect() populates
          the dataCollected/thirdParties sentinels for React runtime rendering.
          They serve different purposes; using openPolicy() without React
          components produces static output the React components never read.
        wrong_pattern: |
          import { openPolicy } from '@openpolicy/vite';
          plugins: [openPolicy({ formats: ['markdown'] })]
        correct_pattern: |
          import { autoCollect } from '@openpolicy/vite-auto-collect';
          plugins: [autoCollect({ thirdParties: { usePackageJson: true } })]
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['getting-started', 'vite-setup']

      - mistake: 'Expecting autoCollect to scan files outside default srcDir'
        mechanism: >
          autoCollect() only scans the srcDir (default: "src"). collecting()
          and thirdParty() calls in config files, scripts, or other directories
          are silently ignored.
        wrong_pattern: |
          // collecting() in scripts/seed.ts — silently ignored
          // autoCollect() never scans outside "src" by default
        correct_pattern: |
          // Either move annotations into src/, or configure srcDir:
          autoCollect({ srcDir: 'app' })
        source: 'packages/vite-auto-collect/src/scan.ts'
        priority: MEDIUM
        status: active

  - name: Annotate Data Collection
    slug: annotate-data-collection
    domain: annotation
    description: >
      Using collecting() throughout the app to mark data collection points
      so the autoCollect plugin can populate dataCollected automatically.
    type: core
    packages:
      - '@openpolicy/sdk'
      - '@openpolicy/vite-auto-collect'
    covers:
      - 'collecting(category, value, labels)'
      - 'dataCollected sentinel from @openpolicy/sdk'
      - 'autoCollected() and spread into privacy.dataCollected'
      - 'DataCategories preset constants'
      - 'string literal constraint on category and labels'
    tasks:
      - 'Mark a form field as collecting personal data'
      - 'Annotate a database write with data category and field labels'
      - 'Use DataCategories presets instead of raw strings'
    failure_modes:
      - mistake: 'Using dynamic values in collecting() category or labels'
        mechanism: >
          The autoCollect plugin uses static AST analysis (oxc-parser) and
          only extracts string literals. Dynamic variables, template literals,
          and computed values are silently skipped — no warning is emitted.
        wrong_pattern: |
          const category = 'Account Information';
          // WRONG: dynamic variable — silently skipped by plugin
          collecting(category, { name, email }, { name: 'Name', email: 'Email' });
        correct_pattern: |
          // correct: string literals only
          collecting('Account Information', { name, email }, { name: 'Name', email: 'Email' });
        source: 'packages/vite-auto-collect/src/analyse.ts'
        priority: HIGH
        status: active

      - mistake: 'Not importing and spreading dataCollected into config'
        mechanism: >
          Even with collecting() calls and autoCollect() wired up, the
          plugin output is discarded unless dataCollected from @openpolicy/sdk
          is imported and spread into privacy.dataCollected.
        wrong_pattern: |
          // openpolicy.ts — WRONG: dataCollected not imported
          export default defineConfig({
            privacy: { dataCollected: {} },
          });
        correct_pattern: |
          import { defineConfig, dataCollected } from '@openpolicy/sdk';
          export default defineConfig({
            privacy: { dataCollected: { ...dataCollected } },
          });
        source: 'packages/sdk/src/auto-collected.ts'
        priority: HIGH
        status: active

      - mistake: 'Calling collecting() with fewer than 3 arguments'
        mechanism: >
          The plugin requires exactly 3 arguments (category, value, labels).
          Calls with fewer arguments are silently skipped. There is no runtime
          error since collecting() is a pass-through at runtime.
        wrong_pattern: |
          // WRONG: missing labels argument — silently skipped
          collecting('Account Information', { name, email });
        correct_pattern: |
          collecting('Account Information', { name, email }, { name: 'Name', email: 'Email address' });
        source: 'packages/vite-auto-collect/src/analyse.ts'
        priority: MEDIUM
        status: active

  - name: Annotate Third Parties
    slug: annotate-third-parties
    domain: annotation
    description: >
      Using thirdParty() calls and/or usePackageJson to auto-populate the
      third-party services list in the privacy policy.
    type: core
    packages:
      - '@openpolicy/sdk'
      - '@openpolicy/vite-auto-collect'
    covers:
      - 'thirdParty(name, purpose, policyUrl)'
      - 'thirdParties sentinel from @openpolicy/sdk'
      - 'usePackageJson option in autoCollect()'
      - 'KNOWN_PACKAGES registry (~30 npm packages)'
      - 'Providers preset constants'
      - 'manual thirdParties array as fallback'
    tasks:
      - 'Mark a third-party SDK usage with thirdParty()'
      - 'Enable usePackageJson to auto-detect known services from package.json'
      - 'Add a service not in the known packages registry manually'
    failure_modes:
      - mistake: 'Using thirdParty() without autoCollect() plugin expecting runtime effect'
        mechanism: >
          thirdParty() is a runtime no-op. It is a build-time marker scanned
          by autoCollect(). Without the plugin, thirdParty() calls have no
          effect and the policy renders with no third parties listed.
        wrong_pattern: |
          // index.ts — calling thirdParty() and expecting runtime effect
          import { thirdParty } from '@openpolicy/sdk';
          thirdParty('Stripe', 'Payment processing', 'https://stripe.com/privacy');
          // Without autoCollect() plugin, this does nothing
        correct_pattern: |
          // 1. Call thirdParty() next to usage code (build-time marker)
          thirdParty('Stripe', 'Payment processing', 'https://stripe.com/privacy');

          // 2. autoCollect() in vite.config.ts scans and populates thirdParties

          // 3. Spread thirdParties sentinel in openpolicy.ts
          import { thirdParties } from '@openpolicy/sdk';
          privacy: { thirdParties: [...thirdParties] }
        source: 'maintainer interview; packages/vite-auto-collect/src/analyse.ts'
        priority: HIGH
        status: active

      - mistake: 'Not spreading thirdParties sentinel into config'
        mechanism: >
          The autoCollect plugin populates the thirdParties sentinel, but
          it is not included in the policy unless explicitly spread into
          privacy.thirdParties. Privacy policy renders with empty third parties.
        wrong_pattern: |
          privacy: { thirdParties: [] }
        correct_pattern: |
          import { thirdParties } from '@openpolicy/sdk';
          privacy: { thirdParties: [...thirdParties] }
        source: 'packages/sdk/src/auto-collected.ts'
        priority: HIGH
        status: active

      - mistake: 'Not enabling usePackageJson when known packages are used'
        mechanism: >
          The KNOWN_PACKAGES registry covers ~30 common npm packages (Stripe,
          Sentry, PostHog, Vercel, etc.). Without usePackageJson: true,
          these are not auto-detected from package.json and must be annotated
          manually with thirdParty() calls.
        wrong_pattern: |
          autoCollect() // usePackageJson defaults to false
        correct_pattern: |
          autoCollect({ thirdParties: { usePackageJson: true } })
        source: 'packages/vite-auto-collect/src/known-packages.ts'
        priority: MEDIUM
        status: active

  - name: Render Policies
    slug: render-policies
    domain: rendering
    description: >
      Using @openpolicy/react components to render privacy policy, terms of
      service, and cookie policy pages — including shadcn/ui registry variants.
    type: framework
    packages:
      - '@openpolicy/react'
      - '@openpolicy/sdk'
    covers:
      - '<PrivacyPolicy>'
      - '<TermsOfService>'
      - '<CookiePolicy>'
      - '<OpenPolicy> / OpenPolicyProvider'
      - 'PolicyComponents customization interface'
      - 'PolicyTheme CSS custom properties'
      - 'defaultStyles and styles.css import'
      - 'data-op-* attributes for custom styling'
      - 'shadcn/ui registry (shadcn add @openpolicy/*)'
    tasks:
      - 'Render a privacy policy page in React'
      - 'Render terms of service and cookie policy pages'
      - 'Customize policy rendering with shadcn/ui registry components'
      - 'Override default styles with CSS custom properties'
    failure_modes:
      - mistake: 'Rendering policy components outside OpenPolicy provider'
        mechanism: >
          PrivacyPolicy, TermsOfService, and CookiePolicy read config from
          React context. Without the provider they silently render null —
          no error is thrown, so the bug is invisible in dev.
        wrong_pattern: |
          // privacy-page.tsx — WRONG: no provider
          export default function PrivacyPage() {
            return <PrivacyPolicy />;
          }
        correct_pattern: |
          // _app.tsx or layout.tsx — wrap at root
          import config from './openpolicy';
          <OpenPolicy config={config}>
            <App />
          </OpenPolicy>

          // privacy-page.tsx — component reads from context
          export default function PrivacyPage() {
            return <PrivacyPolicy />;
          }
        source: 'packages/react/src/context.tsx'
        priority: HIGH
        status: active

      - mistake: 'Forgetting to import styles'
        mechanism: >
          Components render unstyled without the CSS import. The styles are
          not auto-injected in all bundler setups.
        wrong_pattern: |
          // No styles imported — policy renders as unstyled HTML
          import { PrivacyPolicy } from '@openpolicy/react';
        correct_pattern: |
          import '@openpolicy/react/styles.css';
          import { PrivacyPolicy } from '@openpolicy/react';
        source: 'packages/react/src/styles.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Generating static files with openPolicy() vite plugin instead of rendering'
        mechanism: >
          Agents trained on older docs or similar static-site libraries may
          use openPolicy() to emit .md/.html files and serve them statically,
          missing the React rendering path entirely.
        wrong_pattern: |
          // vite.config.ts — WRONG
          import { openPolicy } from '@openpolicy/vite';
          plugins: [openPolicy({ formats: ['html'], outDir: 'public' })]
        correct_pattern: |
          // Render with React instead
          import { PrivacyPolicy } from '@openpolicy/react';
          export default function PrivacyPage() {
            return <PrivacyPolicy />;
          }
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['getting-started', 'render-policies']

  - name: Cookie Banner
    slug: cookie-banner
    domain: rendering
    description: >
      Building a cookie consent banner and preferences panel using useCookies()
      hook, route state machine, and ConsentGate for conditional rendering.
    type: framework
    packages:
      - '@openpolicy/react'
    covers:
      - 'useCookies() hook'
      - 'route state machine (cookie | preferences | closed)'
      - 'acceptAll(), acceptNecessary(), reject()'
      - 'categories array and toggle() for preferences'
      - 'save() to persist preferences'
      - 'ConsentGate component'
      - 'has() expression DSL'
      - 'localStorage persistence (op_consent key)'
      - 'data-consent-* attributes on document.body'
      - 'shadcn/ui registry (shadcn add @openpolicy/cookie-banner)'
    tasks:
      - 'Add a cookie consent banner to a React app'
      - 'Build a cookie preferences panel'
      - 'Conditionally render content based on consent (ConsentGate)'
      - 'Install pre-styled banner via shadcn registry'
    failure_modes:
      - mistake: 'Not gating banner render on route === "cookie"'
        mechanism: >
          The banner should only render when route is "cookie". Without the
          check, the banner renders permanently regardless of consent status.
        wrong_pattern: |
          function CookieBanner() {
            const { acceptAll, acceptNecessary } = useCookies();
            // WRONG: renders always, ignores route state
            return <div>...</div>;
          }
        correct_pattern: |
          function CookieBanner() {
            const { route, acceptAll, acceptNecessary } = useCookies();
            if (route !== 'cookie') return null;
            return <div>...</div>;
          }
        source: 'apps/www/registry/cookie-banner.tsx'
        priority: HIGH
        status: active

      - mistake: 'Building custom cookie consent state instead of using useCookies()'
        mechanism: >
          Agents may implement useState-based consent flags manually, missing
          the localStorage persistence, cross-tab sync, and document.body
          data attributes that useCookies() provides automatically.
        wrong_pattern: |
          const [accepted, setAccepted] = useState(false);
          // Custom localStorage logic, missing cross-tab sync
        correct_pattern: |
          const { status, acceptAll, acceptNecessary, has } = useCookies();
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Not using OpenPolicy provider before using useCookies()'
        mechanism: >
          useCookies() reads cookie config (which categories to show) from
          context. Without the provider it returns null consent and empty
          categories, silently breaking the preferences panel.
        wrong_pattern: |
          // WRONG: no provider
          function App() { return <CookieBanner />; }
        correct_pattern: |
          function App() {
            return (
              <OpenPolicy config={config}>
                <CookieBanner />
              </OpenPolicy>
            );
          }
        source: 'packages/react/src/context.tsx'
        priority: HIGH
        status: active
        skills: ['cookie-banner', 'render-policies']

  - name: Migrate from Manual Policies
    slug: migrate
    domain: policy-definition
    description: >
      Converting existing hand-written privacy policies or terms of service
      documents into OpenPolicy defineConfig() configs.
    type: lifecycle
    packages:
      - '@openpolicy/sdk'
      - '@openpolicy/core'
    covers:
      - 'Mapping prose sections to PrivacyPolicyConfig/TermsOfServiceConfig fields'
      - 'DataCategories, Retention, Rights presets as migration aids'
      - 'Identifying jurisdiction from existing policy'
      - 'Legal basis mapping for GDPR policies'
      - 'Terms conditional sections (payments, userContent, etc.)'
    tasks:
      - 'Convert an existing privacy policy document to defineConfig()'
      - 'Map a hand-written terms of service into TermsOfServiceConfig'
      - 'Identify which optional terms sections to include'
    failure_modes:
      - mistake: 'Rewriting policy content as free text instead of mapping to fields'
        mechanism: >
          OpenPolicy generates all prose from structured fields. Agents may
          try to pass raw paragraph text as field values, which either fails
          TypeScript validation or produces malformed output.
        wrong_pattern: |
          privacy: {
            dataCollected: {
              // WRONG: pasting prose instead of structured fields
              'Data': ['We collect information you provide when you register...'],
            }
          }
        correct_pattern: |
          privacy: {
            dataCollected: {
              'Account Information': ['Email address', 'Display name'],
              'Usage Data': ['Pages visited', 'Session duration'],
            }
          }
        source: 'packages/core/src/types.ts'
        priority: HIGH
        status: active

      - mistake: 'Omitting optional terms sections that cover existing policy content'
        mechanism: >
          Many TermsOfServiceConfig sections are optional but if the existing
          policy has that content (e.g. payments, userContent, termination) it
          should be mapped. Agents may skip optional sections, producing a
          terms document missing material the legal team approved.
        wrong_pattern: |
          terms: {
            effectiveDate: '2026-01-01',
            acceptance: { methods: ['using the service'] },
            governingLaw: { jurisdiction: 'Delaware, USA' },
            // payments, termination, userContent omitted despite existing policy having them
          }
        correct_pattern: |
          terms: {
            effectiveDate: '2026-01-01',
            acceptance: { methods: ['using the service'] },
            governingLaw: { jurisdiction: 'Delaware, USA' },
            payments: { hasPaidFeatures: true, refundPolicy: '30-day money back' },
            termination: { companyCanTerminate: true, userCanTerminate: true },
          }
        source: 'packages/core/src/types.ts'
        priority: MEDIUM
        status: active

tensions:
  - name: Minimal working setup vs legally complete config
    skills: ['getting-started', 'define-config']
    description: >
      A minimal getting-started config compiles and renders, but may omit
      legally required fields (jurisdictions, legalBasis for GDPR, governingLaw
      for terms) that are not enforced by TypeScript.
    implication: >
      An agent following getting-started produces a working demo but a
      legally incomplete document. It should prompt for jurisdiction and
      compliance intent before generating the config.

  - name: Auto-annotation vs explicit declaration
    skills: ['annotate-data-collection', 'annotate-third-parties']
    description: >
      autoCollect() plus collecting()/thirdParty() provides automatic coverage,
      but usePackageJson is a blunter instrument that may over-report services.
      Mixing both can cause duplicates or missed entries.
    implication: >
      An agent may enable usePackageJson and also add thirdParty() calls for
      the same services, producing duplicate entries, or may choose one
      approach and miss the other entirely.

  - name: Runtime rendering vs static generation
    skills: ['render-policies', 'vite-setup']
    description: >
      The React rendering path (current) and the openPolicy() static file
      generation path (legacy) are mutually exclusive approaches that look
      similar to an agent reading surface-level docs.
    implication: >
      An agent may mix both approaches (running openPolicy() AND rendering
      <PrivacyPolicy>), producing duplicate outputs or using the wrong
      plugin entirely.

cross_references:
  - from: getting-started
    to: define-config
    reason: >
      Getting started uses a minimal config; complete legal compliance
      requires knowing all fields in define-config.

  - from: getting-started
    to: vite-setup
    reason: >
      Plugin configuration is part of getting started; vite-setup covers
      advanced options and edge cases.

  - from: annotate-data-collection
    to: annotate-third-parties
    reason: >
      Both skills use the same autoCollect() plugin and the same sentinel
      spread pattern; developers typically set up both at the same time.

  - from: render-policies
    to: cookie-banner
    reason: >
      Both require <OpenPolicy> provider wrapping; cookie-banner also shares
      the useCookies() context used by CookiePolicy rendering.

  - from: define-config
    to: render-policies
